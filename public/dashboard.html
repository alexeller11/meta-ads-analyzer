<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meta Ads Analyzer</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#08090d;--s1:#0f1118;--s2:#161923;--s3:#1c2130;
      --b1:#1e2433;--b2:#252d3f;
      --blue:#1877F2;--cyan:#00d4ff;--green:#00e676;
      --orange:#ff9800;--red:#ff3860;--yellow:#ffeb3b;--purple:#b388ff;
      --text:#e8eaf0;--dim:#8892a4;--muted:#3d4456;
    }
    body{background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;min-height:100vh;display:flex;flex-direction:column;font-size:13px}
    .topbar{height:52px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;position:sticky;top:0;z-index:100}
    .logo{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;white-space:nowrap}
    .logo-icon{width:26px;height:26px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px}
    .logo span{color:var(--cyan)}
    .sep{width:1px;height:20px;background:var(--b1);flex-shrink:0}
    select.sel, input.sel{background:var(--s2);border:1px solid var(--b1);color:var(--text);padding:5px 10px;border-radius:6px;font-family:Arial,sans-serif;font-size:12px;cursor:pointer}
    select.sel:focus{outline:1px solid var(--blue)}
    .btn{display:inline-flex;align-items:center;gap:6px;border:none;padding:6px 14px;border-radius:7px;font-family:Arial,sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
    .btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:#0b5fcc}
    .btn-ghost{background:var(--s2);border:1px solid var(--b1);color:var(--dim)}.btn-ghost:hover{color:var(--text);border-color:var(--b2)}
    .topbar-mid{display:flex;align-items:center;gap:8px;flex:1;overflow:hidden}
    .topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
    .user-chip{display:flex;align-items:center;gap:6px;padding:3px 10px 3px 3px;background:var(--s2);border:1px solid var(--b1);border-radius:20px}
    .user-avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;background:var(--b2)}
    .app-body{display:flex;flex:1;min-height:0}
    .sidebar{width:210px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--b1);overflow-y:auto;display:flex;flex-direction:column}
    .sidebar-section{padding:12px 10px 0}
    .slabel{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:0 6px;margin-bottom:5px;font-weight:700}
    .nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;font-size:12px;font-weight:700;color:var(--dim);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all .15s}
    .nav-item:hover{background:var(--s2);color:var(--text)}
    .nav-item.active{background:rgba(24,119,242,.12);color:var(--blue)}
    .nav-icon{font-size:13px;width:18px;text-align:center}
    .main{flex:1;overflow-y:auto;padding:18px;background:var(--bg)}
    .mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;margin-bottom:14px}
    .mcard{background:var(--s1);border:1px solid var(--b1);border-radius:9px;padding:13px;transition:border-color .2s}
    .mlabel{font-size:9px;color:var(--muted);margin-bottom:5px;letter-spacing:.06em;text-transform:uppercase;font-weight:700}
    .mval{font-size:24px;font-weight:800;line-height:1}
    .msub{font-size:10px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
    .summary-hdr{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--s1);border:1px solid var(--b1);border-radius:10px;margin-bottom:14px}
    .score-ring{width:60px;height:60px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;border:3px solid}
    .score-num{font-size:20px;font-weight:800;line-height:1}
    .loading-overlay{display:none;position:fixed;inset:0;background:rgba(8,9,13,.9);backdrop-filter:blur(6px);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:14px}
    .loading-overlay.show{display:flex}
    .spinner{width:40px;height:40px;border:3px solid var(--b2);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .stitle{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;font-weight:700}
    .table-wrap{overflow-x:auto;border-radius:9px;border:1px solid var(--b1);margin-bottom:16px}
    table{width:100%;border-collapse:collapse;font-size:11px;background:var(--s1);min-width:980px}
    thead th{padding:8px 10px;text-align:left;font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--b1);white-space:nowrap;cursor:pointer}
    tbody td{padding:8px 10px;border-bottom:1px solid var(--b1)}
    .chart-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:9px;padding:14px;margin-bottom:14px}
  </style>
</head>
<body>

<header class="topbar">
  <div class="logo"><div class="logo-icon">&#9889;</div>Meta Ads <span>Analyzer</span></div>
  <select class="sel" id="accountSel" style="max-width:230px"><option value="">Carregando contas...</option></select>
  <select class="sel" id="dateSel" onchange="onDateSelChange()">
    <option value="last_7d">7 dias</option>
    <option value="last_14d">14 dias</option>
    <option value="last_30d" selected>30 dias</option>
    <option value="last_90d">90 dias</option>
    <option value="this_month">Este mes</option>
    <option value="last_month">Mes passado</option>
    <option value="custom">Personalizado...</option>
  </select>
  <div id="customDateWrap" style="display:none;align-items:center;gap:4px">
    <input type="date" id="customSince" class="sel">
    <span style="color:var(--dim)">até</span>
    <input type="date" id="customUntil" class="sel">
  </div>
  <button class="btn btn-primary" onclick="runAnalysis()">Analisar</button>
  <div style="margin-left:auto; display:flex; align-items:center; gap:12px">
    <span id="uName">Alex</span>
    <img id="uAvatar" style="width:26px; border-radius:50%">
  </div>
</header>

<div class="app-body">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="slabel">Navegação</div>
      <button class="nav-item active" onclick="showView('overview')">📊 Visão Geral</button>
      <button class="nav-item" onclick="showView('analysis')">🧠 Análise IA</button>
      <button class="nav-item" onclick="showView('campaigns')">📋 Campanhas</button>
      <button class="nav-item" onclick="showView('creatives')">🖼️ Criativos</button>
      <button class="nav-item" onclick="showView('breakdown')">📉 Breakdown</button>
      <button class="nav-item" onclick="showView('content')">📸 Conteúdo IG</button>
      <button class="nav-item" onclick="showView('google')">🔍 Google Ads</button>
      <button class="nav-item" onclick="showView('trend')">📈 Tendências</button>
    </div>
    <div class="sidebar-section">
      <div class="slabel">Campanhas Ativas</div>
      <div id="campSidebar" style="padding:0 12px; color:var(--dim)">Selecione uma conta...</div>
    </div>
  </aside>

  <main class="main" id="mainContent">
    <div id="stateEmpty" style="text-align:center; padding-top:100px; opacity:0.6">
      <h2>Escolha uma conta e clique em Analisar</h2>
    </div>

    <div id="contentWrap" style="display:none">
      <div id="view-overview">
        <div id="analysisSummary"></div>
        <div class="stitle">MÉTRICAS DO PERÍODO</div>
        <div class="mgrid" id="metricsGrid"></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Campanha</th><th>Performance</th><th>Gasto</th><th>CTR</th><th>CPC</th><th>Freq.</th></tr></thead>
            <tbody id="campTbody"></tbody>
          </table>
        </div>
      </div>

      <div id="view-analysis" style="display:none">
        <div id="optimList"></div>
      </div>

      <div id="view-breakdown" style="display:none">
         <div id="bdContent"></div>
      </div>

      <div id="view-content" style="display:none">
        <div style="background:var(--s1); padding:20px; border-radius:12px">
          <h3>Planejamento de Conteúdo Instagram</h3>
          <select class="sel" id="igAccSel" onchange="onIgAccChange()"><option value="">Carregar contas IG...</option></select>
          <input type="text" id="igNiche" placeholder="Nicho da empresa" class="sel" style="margin-top:10px; width:100%">
          <button class="btn btn-primary" id="btnGenPlan" onclick="generateContentPlan()" style="margin-top:10px">Gerar Planejamento</button>
          <div id="contentPlanOutput" style="margin-top:20px"></div>
        </div>
      </div>
      
      <div id="view-trend" style="display:none">
        <div class="chart-wrap"><canvas id="cHealth" height="100"></canvas></div>
      </div>
    </div>
  </main>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div id="loadText">Carregando dados...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
let accounts=[], campaigns=[], metrics=null, analysis=null, selAccountId=null, igAccounts=[], currentIgAcc=null, contentPlan=null;

function showLoad(t){document.getElementById('loadingOverlay').classList.add('show');document.getElementById('loadText').textContent=t;}
function hideLoad(){document.getElementById('loadingOverlay').classList.remove('show');}
function sym(){return accounts.find(a=>a.account_id===selAccountId)?.currency==='USD'?'$':'R$';}

async function init(){
  const me=await fetch('/api/me').then(r=>r.json());
  if(!me.authenticated) return location.href='/';
  document.getElementById('uName').textContent=me.user.name;
  await loadAccounts();
}

async function loadAccounts(){
  const d=await fetch('/api/adaccounts').then(r=>r.json());
  accounts=d.data||[];
  document.getElementById('accountSel').innerHTML='<option value="">Selecione...</option>'+accounts.map(a=>`<option value="${a.account_id}">${a.name}</option>`).join('');
  document.getElementById('accountSel').onchange=onAccChange;
}

async function onAccChange(){
  selAccountId=document.getElementById('accountSel').value;
  if(!selAccountId)return;
  showLoad('Carregando campanhas...');
  try {
    const d=await fetch(`/api/adaccounts/${selAccountId}/campaigns`).then(r=>r.json());
    campaigns=d.data||[];
    document.getElementById('campSidebar').innerHTML=campaigns.slice(0,10).map(c=>`<div>• ${c.name}</div>`).join('');
  } finally { hideLoad(); }
}

function showView(v){
  const views=['overview','analysis','campaigns','creatives','breakdown','content','google','trend'];
  views.forEach(id=>{ const el=document.getElementById('view-'+id); if(el) el.style.display=id===v?'block':'none'; });
  document.querySelectorAll('.nav-item').forEach(btn=>btn.classList.remove('active'));
}

async function runAnalysis(){
  if(!selAccountId) return alert('Selecione uma conta');
  showLoad('Analisando com IA...');
  try {
    const d=document.getElementById('dateSel').value;
    const ins=await fetch(`/api/adaccounts/${selAccountId}/insights?date_preset=${d}`).then(r=>r.json());
    const res=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accountData:accounts.find(a=>a.account_id===selAccountId),campaigns,insights:ins,dateRange:d})}).then(r=>r.json());
    metrics=res.metrics; analysis=res.analysis; renderAll();
  } catch(e) { alert('Erro: '+e.message); }
  finally { hideLoad(); }
}

function renderAll(){
  document.getElementById('stateEmpty').style.display='none';
  document.getElementById('contentWrap').style.display='block';
  const S=sym();
  document.getElementById('metricsGrid').innerHTML=`
    <div class="mcard"><div class="mlabel">Investimento</div><div class="mval">${S} ${metrics.totalSpend.toFixed(2)}</div></div>
    <div class="mcard"><div class="mlabel">CTR</div><div class="mval">${metrics.avgCtr.toFixed(2)}%</div></div>
  `;
  document.getElementById('campTbody').innerHTML=analysis.campanhas_analise.map(c=>`<tr><td>${c.nome}</td><td>${c.status_performance}</td><td>${c.gasto}</td><td>${c.ctr}</td><td>${c.cpc}</td><td>${c.frequencia}x</td></tr>`).join('');
}

async function loadIgAccounts(){
  const r=await fetch('/api/instagram/accounts').then(r=>r.json());
  igAccounts=r.data||[];
  document.getElementById('igAccSel').innerHTML='<option value="">Selecione IG...</option>'+igAccounts.map(a=>`<option value="${a.id}">${a.username}</option>`).join('');
}

async function exportContentPlan(){
  if(!contentPlan){alert('Gere o plano.');return;}
  let html='<html><body><h1>Planeamento</h1>';
  (contentPlan.plano||[]).forEach(p=>{
    html+=`<div><b>Dia ${p.dia}</b>: ${p.titulo}<br>${p.copy.replace(/\n/g,'<br>')}</div><hr>`;
  });
  html+='</body></html>';
  const w=window.open('','_blank'); w.document.write(html); w.document.close();
}

function onDateSelChange(){ document.getElementById('customDateWrap').style.display=document.getElementById('dateSel').value==='custom'?'flex':'none'; }

init();
</script>
</body>
</html>
