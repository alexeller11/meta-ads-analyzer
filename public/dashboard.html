<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meta Ads Analyzer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root{--bg:#0b1220;--card:#131c31;--muted:#91a0b7;--text:#eef3ff;--line:#26324d;--primary:#4f8cff;--success:#1ec98b;--warning:#ffb649;--danger:#ff647c}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .top{display:flex;gap:10px;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(11,18,32,.95);backdrop-filter:blur(10px);z-index:9}
    .logo{font-weight:900}.logo span{color:var(--primary)}
    select,input,button,textarea{font:inherit;border-radius:10px;border:1px solid var(--line);background:#11192c;color:var(--text);padding:10px 12px}
    button{cursor:pointer}.btn-primary{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:700}
    .wrap{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 61px)}
    .side{border-right:1px solid var(--line);padding:16px}.navbtn{display:block;width:100%;text-align:left;margin-bottom:8px;background:transparent}.navbtn.active{background:#1a2540;border-color:#38548d;color:#fff}
    .main{padding:22px}.grid{display:grid;gap:14px}.grid.cards{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-bottom:18px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}.label{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:.4px}.value{font-size:28px;font-weight:900;margin-top:6px}
    .sub{font-size:12px;color:var(--muted);margin-top:4px}.section{display:none}.section.active{display:block}
    table{width:100%;border-collapse:collapse}.table{overflow:auto}.table-wrap{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:8px}
    th,td{padding:12px 10px;border-bottom:1px solid var(--line);font-size:13px;text-align:left}.badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:800}
    .s{background:rgba(30,201,139,.12);color:var(--success)}.w{background:rgba(255,182,73,.12);color:var(--warning)}.d{background:rgba(255,100,124,.12);color:var(--danger)}.p{background:rgba(79,140,255,.12);color:var(--primary)}
    .split{display:grid;grid-template-columns:1.2fr .8fr;gap:16px}.hero{display:flex;justify-content:space-between;gap:18px;align-items:center}
    .hero h2{margin:0 0 8px}.muted{color:var(--muted)}.pill{padding:8px 12px;border-radius:999px;background:#11192c;border:1px solid var(--line)}
    .actions li{margin-bottom:8px}.decision-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
    .decision-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}.decision-card h4{margin:0 0 8px}
    .chart-box{height:300px}.small{font-size:12px}.empty{padding:60px 20px;text-align:center;color:var(--muted)}
    .modalbg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;padding:20px}.modalbg.open{display:flex}
    .modal{background:var(--card);border:1px solid var(--line);border-radius:18px;max-width:760px;width:100%;max-height:85vh;overflow:auto;padding:20px}
    .top-right{margin-left:auto;display:flex;gap:10px;align-items:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.side{display:flex;overflow:auto;gap:8px}.navbtn{min-width:160px}.split{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="top">
    <div class="logo">Meta<span>Analyzer</span></div>
    <select id="accountSel"><option>Carregando contas...</option></select>
    <select id="nicheSel">
      <option value="Geral">Geral</option><option value="E-commerce">E-commerce</option><option value="Infoprodutos">Infoprodutos</option><option value="Negócios Locais">Negócios Locais</option><option value="Serviços B2B">Serviços B2B</option><option value="Imobiliário">Imobiliário</option>
    </select>
    <select id="dateSel">
      <option value="last_7d">Últimos 7 dias</option><option value="last_14d">Últimos 14 dias</option><option value="last_30d" selected>Últimos 30 dias</option><option value="last_90d">Últimos 90 dias</option>
    </select>
    <button class="btn-primary" onclick="runAnalysis()">Analisar</button>
    <div class="top-right"><span id="userName" class="muted"></span><a href="/auth/logout" class="pill muted" style="text-decoration:none">Sair</a></div>
  </div>

  <div class="wrap">
    <aside class="side">
      <button class="navbtn active" onclick="showSection('overview', this)">Visão geral</button>
      <button class="navbtn" onclick="showSection('decision', this)">Central de decisão</button>
      <button class="navbtn" onclick="showSection('analysis', this)">Insights IA</button>
      <button class="navbtn" onclick="showSection('campaigns', this)">Campanhas</button>
      <button class="navbtn" onclick="showSection('creatives', this)">Criativos</button>
      <button class="navbtn" onclick="showSection('breakdown', this)">Breakdown</button>
      <button class="navbtn" onclick="showSection('trend', this)">Tendência</button>
      <button class="navbtn" onclick="showSection('notes', this)">Notas</button>
    </aside>

    <main class="main">
      <div id="empty" class="empty">Selecione uma conta e rode a análise.</div>

      <section id="overview" class="section active">
        <div id="hero"></div>
        <div id="overviewCards" class="grid cards"></div>
      </section>

      <section id="decision" class="section">
        <div id="decisionSummary" class="grid cards"></div>
        <div class="split" style="margin-top:16px">
          <div class="card">
            <div class="label">Ações imediatas</div>
            <ul id="immediateActions" class="actions"></ul>
          </div>
          <div class="card">
            <div class="label">Redistribuição de verba</div>
            <div id="allocationBox" class="small muted" style="margin-top:10px"></div>
          </div>
        </div>
        <div id="decisionCards" class="decision-list" style="margin-top:16px"></div>
      </section>

      <section id="analysis" class="section">
        <div class="hero card"><div><h2>Insights da IA</h2><div class="muted">Resumo e prioridades da conta</div></div><button class="btn-primary" onclick="openCopilot()">Plano de Guerra</button></div>
        <div id="analysisList" class="grid" style="margin-top:16px"></div>
      </section>

      <section id="campaigns" class="section"><div class="table-wrap table"><table><thead><tr><th>Campanha</th><th>Gasto</th><th>CTR</th><th>ROAS</th><th>Freq.</th><th>Mensagens</th><th>Compras</th><th>Status</th><th>Ação</th></tr></thead><tbody id="campaignRows"></tbody></table></div></section>
      <section id="creatives" class="section"><div id="creativeGrid" class="decision-list"></div></section>
      <section id="breakdown" class="section"><div class="card"><div class="label">Breakdown por dispositivo</div><div class="chart-box"><canvas id="breakdownChart"></canvas></div></div></section>
      <section id="trend" class="section"><div class="card"><div class="label">Score de saúde e gasto</div><div class="chart-box"><canvas id="trendChart"></canvas></div></div></section>
      <section id="notes" class="section"><div class="card"><div class="label">Nova nota</div><textarea id="noteInput" style="width:100%;min-height:100px;margin-top:10px"></textarea><div style="margin-top:10px"><button class="btn-primary" onclick="saveNote()">Salvar nota</button></div></div><div id="notesList" class="grid" style="margin-top:16px"></div></section>
    </main>
  </div>

  <div id="modalBg" class="modalbg" onclick="if(event.target===this)this.classList.remove('open')"><div class="modal"><div style="display:flex;justify-content:space-between;align-items:center"><h3 id="modalTitle" style="margin:0"></h3><button onclick="document.getElementById('modalBg').classList.remove('open')">Fechar</button></div><div id="modalBody" class="small" style="margin-top:16px;line-height:1.7"></div></div></div>

<script>
let state = { accounts: [], selectedAccountId: '', campaigns: [], insights: null, creatives: [], analysis: null, metrics: null, comparison: null, charts: {} };

async function init(){
  const me = await fetch('/api/me').then(r=>r.json());
  if(!me.authenticated){ location.href = '/'; return; }
  document.getElementById('userName').textContent = me.user.name;
  const accounts = await fetch('/api/adaccounts').then(r=>r.json());
  state.accounts = accounts.data || [];
  const sel = document.getElementById('accountSel');
  sel.innerHTML = '<option value="">Escolha a conta</option>' + state.accounts.map(a=>`<option value="${a.account_id}">${a.name}</option>`).join('');
  sel.onchange = async () => {
    state.selectedAccountId = sel.value;
    if(!state.selectedAccountId) return;
    state.campaigns = (await fetch(`/api/adaccounts/${state.selectedAccountId}/campaigns`).then(r=>r.json())).data || [];
  };
}

function currency(){ return state.accounts.find(a=>a.account_id===state.selectedAccountId)?.currency === 'USD' ? '$' : 'R$'; }
function params(){ return 'date_preset=' + document.getElementById('dateSel').value; }
function badge(action){
  if(action==='ESCALAR') return '<span class="badge s">ESCALAR</span>';
  if(action==='PAUSAR') return '<span class="badge d">PAUSAR</span>';
  if(action==='RENOVAR_CRIATIVO') return '<span class="badge w">RENOVAR CRIATIVO</span>';
  if(action==='TESTAR_NOVA_VARIACAO') return '<span class="badge p">TESTAR</span>';
  return '<span class="badge p">MANTER/OTIMIZAR</span>';
}

async function runAnalysis(){
  if(!state.selectedAccountId){ alert('Selecione uma conta.'); return; }
  const p = params();
  const [insights, creatives, comparison] = await Promise.all([
    fetch(`/api/adaccounts/${state.selectedAccountId}/insights?${p}`).then(r=>r.json()),
    fetch(`/api/adaccounts/${state.selectedAccountId}/creatives?${p}`).then(r=>r.json()),
    fetch(`/api/adaccounts/${state.selectedAccountId}/comparison?${p}`).then(r=>r.json())
  ]);
  state.insights = insights;
  state.creatives = creatives.data || [];
  state.comparison = comparison;

  const accountData = state.accounts.find(a=>a.account_id===state.selectedAccountId);
  const result = await fetch('/api/analyze', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ accountData, campaigns: state.campaigns, insights, dateRange: document.getElementById('dateSel').value, niche: document.getElementById('nicheSel').value, previousMetrics: comparison.previous })
  }).then(r=>r.json());

  state.metrics = result.metrics;
  state.analysis = result.analysis;
  document.getElementById('empty').style.display = 'none';
  renderOverview();
  renderDecision();
  renderAnalysis();
  renderCampaigns();
  renderCreatives();
  renderBreakdown();
  renderTrend();
  loadNotes();
}

function renderOverview(){
  const m = state.metrics, a = state.analysis, c = currency();
  const score = a.resumo_geral.score_saude;
  document.getElementById('hero').innerHTML = `
    <div class="card hero">
      <div><h2>Score ${score} — ${a.resumo_geral.nivel_saude}</h2><div class="muted">${a.resumo_geral.resumo_historico}</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap"><span class="pill">ROAS ${m.roas.toFixed(2)}x</span><span class="pill">CTR ${m.avgCtr.toFixed(2)}%</span><span class="pill">Freq. ${m.avgFrequency.toFixed(2)}</span></div>
    </div>`;
  document.getElementById('overviewCards').innerHTML = [
    ['Investimento', `${c} ${m.totalSpend.toFixed(2)}`, 'Gasto do período'],
    ['Receita', `${c} ${m.totalRev.toFixed(2)}`, 'Receita rastreada'],
    ['ROAS', `${m.roas.toFixed(2)}x`, 'Retorno sobre investimento'],
    ['CTR', `${m.avgCtr.toFixed(2)}%`, 'Taxa média de clique'],
    ['CPM', `${c} ${m.avgCpm.toFixed(2)}`, 'Custo por mil'],
    ['CPC', `${c} ${m.avgCpc.toFixed(2)}`, 'Custo por clique'],
    ['Mensagens', `${m.totalMessages}`, 'Conversas geradas'],
    ['Compras', `${m.totalPurchases}`, 'Conversões de venda']
  ].map(x => `<div class="card"><div class="label">${x[0]}</div><div class="value">${x[1]}</div><div class="sub">${x[2]}</div></div>`).join('');
}

function renderDecision(){
  const dc = state.analysis.decision_center; const c = currency();
  document.getElementById('decisionSummary').innerHTML = [
    ['Escalar', dc.summary.scaleCount], ['Pausar', dc.summary.pauseCount], ['Renovar', dc.summary.refreshCount], ['Testar', dc.summary.testCount], ['Desperdício estimado', `${c} ${dc.summary.totalEstimatedWaste.toFixed(2)}`], ['Verba para redistribuir', `${c} ${dc.summary.reallocationPool.toFixed(2)}`]
  ].map(x=>`<div class="card"><div class="label">${x[0]}</div><div class="value">${x[1]}</div></div>`).join('');
  document.getElementById('immediateActions').innerHTML = (dc.immediateActions||[]).map(x=>`<li>${x}</li>`).join('') || '<li>Nenhuma ação imediata identificada.</li>';
  document.getElementById('allocationBox').innerHTML = dc.allocationSuggestions.length ? dc.allocationSuggestions.map(x=>`<div style="margin-bottom:10px"><strong>${x.campaignName}</strong><br>+ ${c} ${x.suggestedExtraBudget.toFixed(2)}<br><span class="muted">${x.reason}</span></div>`).join('') : 'Sem sugestão clara de redistribuição neste momento.';
  document.getElementById('decisionCards').innerHTML = dc.campaigns.map(camp=>`
    <div class="decision-card">
      <div style="display:flex;justify-content:space-between;gap:8px;align-items:start"> <h4>${camp.name}</h4> ${badge(camp.decision.action)} </div>
      <div class="small muted">${camp.decision.reason}</div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px" class="small">
        <div><strong>Gasto</strong><br>${currency()} ${Number(camp.spend||0).toFixed(2)}</div>
        <div><strong>ROAS</strong><br>${Number(camp.roas||0).toFixed(2)}x</div>
        <div><strong>CTR</strong><br>${Number(camp.ctr||0).toFixed(2)}%</div>
        <div><strong>Frequência</strong><br>${Number(camp.frequency||0).toFixed(2)}</div>
      </div>
      <div style="margin-top:12px;padding:10px;border:1px dashed var(--line);border-radius:12px" class="small">
        <strong>Próxima ação</strong><br>${camp.decision.budgetSuggestion}
      </div>
    </div>`).join('');
}

function renderAnalysis(){
  const list = state.analysis.otimizacoes_prioritarias || [];
  document.getElementById('analysisList').innerHTML = list.length ? list.map(item=>`
    <div class="card"><div style="display:flex;gap:8px;margin-bottom:8px"><span class="badge ${item.prioridade===1?'d':'w'}">P${item.prioridade}</span><span class="badge p">${item.categoria}</span></div><h3 style="margin:0 0 8px">${item.titulo}</h3><div class="muted">${item.descricao}</div><div style="margin-top:12px" class="small"><strong>Ação:</strong> ${item.acao}</div></div>`).join('') : '<div class="card">Nenhuma recomendação prioritária.</div>';
}

function renderCampaigns(){
  const rows = state.analysis.campanhas_analise || [];
  document.getElementById('campaignRows').innerHTML = rows.map(c=>`<tr><td>${c.name}</td><td>${currency()} ${Number(c.spend||0).toFixed(2)}</td><td>${Number(c.ctr||0).toFixed(2)}%</td><td>${Number(c.roas||0).toFixed(2)}x</td><td>${Number(c.frequency||0).toFixed(2)}</td><td>${c.messages||0}</td><td>${c.purchases||0}</td><td>${c.status_performance||'-'}</td><td>${badge(c.decision?.action || 'MANTER_E_OTIMIZAR')}</td></tr>`).join('');
}

function renderCreatives(){
  const list = [...(state.creatives||[])].sort((a,b)=>Number(b?.insights?.data?.[0]?.spend||0)-Number(a?.insights?.data?.[0]?.spend||0)).slice(0,12);
  document.getElementById('creativeGrid').innerHTML = list.map(cr=>{
    const ins = cr.insights?.data?.[0] || {}; const img = cr.creative?.image_url || cr.creative?.thumbnail_url || ''; const spend = Number(ins.spend||0); const ctr = Number(ins.ctr||0); const clicks = Number(ins.clicks||0);
    return `<div class="decision-card">${img?`<img src="${img}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:12px;margin-bottom:10px">`:''}<h4>${cr.name}</h4><div class="small muted">Gasto ${currency()} ${spend.toFixed(2)} · CTR ${ctr.toFixed(2)}% · Cliques ${clicks}</div></div>`;
  }).join('') || '<div class="card">Sem criativos no período.</div>';
}

async function renderBreakdown(){
  const res = await fetch(`/api/adaccounts/${state.selectedAccountId}/breakdown/device?${params()}`).then(r=>r.json()).catch(()=>({data:[]}));
  const rows = res.data || [];
  const labels = rows.map(x=>x.device_platform || 'outros');
  const values = rows.map(x=>Number(x.spend||0));
  if(state.charts.breakdown) state.charts.breakdown.destroy();
  state.charts.breakdown = new Chart(document.getElementById('breakdownChart'), {type:'bar',data:{labels,datasets:[{label:'Gasto',data:values}]},options:{responsive:true,maintainAspectRatio:false}});
}

async function renderTrend(){
  const res = await fetch(`/api/trend/${state.selectedAccountId}`).then(r=>r.json()).catch(()=>({trend:[]}));
  const rows = res.trend || [];
  const labels = rows.map(x=>new Date(x.date).toLocaleDateString('pt-BR'));
  const score = rows.map(x=>Number(x.avg_health||0));
  const spend = rows.map(x=>Number(x.total_spend||0));
  if(state.charts.trend) state.charts.trend.destroy();
  state.charts.trend = new Chart(document.getElementById('trendChart'), {type:'line',data:{labels,datasets:[{label:'Score',data:score,yAxisID:'y'},{label:'Gasto',data:spend,yAxisID:'y1'}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true,max:100},y1:{position:'right',beginAtZero:true}}}});
}

async function openCopilot(){
  const res = await fetch('/api/gpt-copilot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:{metrics:state.metrics,analysis:state.analysis,decisionCenter:state.analysis.decision_center,niche:document.getElementById('nicheSel').value}})}).then(r=>r.json());
  document.getElementById('modalTitle').textContent = 'Plano de Guerra';
  document.getElementById('modalBody').innerHTML = (res.strategy || '').replace(/\n/g,'<br>');
  document.getElementById('modalBg').classList.add('open');
}

function showSection(id, btn){ document.querySelectorAll('.section').forEach(x=>x.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.navbtn').forEach(x=>x.classList.remove('active')); if(btn) btn.classList.add('active'); }

async function loadNotes(){
  const notes = await fetch(`/api/notes/${state.selectedAccountId}`).then(r=>r.json()).catch(()=>[]);
  document.getElementById('notesList').innerHTML = notes.map(n=>`<div class="card"><div class="small muted">${new Date(n.created_at).toLocaleString('pt-BR')}</div><div style="margin-top:8px">${n.note}</div></div>`).join('') || '<div class="card">Nenhuma nota.</div>';
}

async function saveNote(){
  const note = document.getElementById('noteInput').value.trim(); if(!note) return;
  await fetch('/api/notes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fbAccountId:state.selectedAccountId,note,type:'geral'})});
  document.getElementById('noteInput').value=''; loadNotes();
}

init();
</script>
</body>
</html>
