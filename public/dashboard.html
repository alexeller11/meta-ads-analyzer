<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meta Ads Analyzer - Full Suite</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#08090d;--s1:#0f1118;--s2:#161923;--b1:#1e2433;
      --blue:#1877F2;--cyan:#00d4ff;--green:#00e676;--text:#e8eaf0;--dim:#8892a4;
    }
    body{background:var(--bg);color:var(--text);font-family:Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column}
    .topbar{height:52px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:100}
    .logo{font-weight:800;font-size:14px} .logo span{color:var(--cyan)}
    .sel, .btn{background:var(--s2);border:1px solid var(--b1);color:var(--text);padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer}
    .btn-primary{background:var(--blue);color:#fff;border:none}
    .app-body{display:flex;flex:1;min-height:0}
    .sidebar{width:210px;background:var(--s1);border-right:1px solid var(--b1);padding:10px;overflow-y:auto}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--dim);cursor:pointer;width:100%;text-align:left;background:none;border:none;margin-bottom:4px}
    .nav-item:hover, .nav-item.active{background:rgba(24,119,242,0.15);color:var(--blue)}
    .main{flex:1;padding:20px;overflow-y:auto}
    .mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:20px}
    .mcard{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:15px}
    .mval{font-size:24px;font-weight:800;margin-top:5px} .mlabel{font-size:10px;color:var(--dim);text-transform:uppercase;font-weight:700}
    .loading-overlay{display:none;position:fixed;inset:0;background:rgba(8,9,13,0.9);z-index:2000;flex-direction:column;align-items:center;justify-content:center}
    .loading-overlay.show{display:flex}
    .spinner{width:40px;height:40px;border:3px solid var(--b1);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    table{width:100%;border-collapse:collapse} th,td{padding:12px;text-align:left;border-bottom:1px solid var(--b1)}
  </style>
</head>
<body>

<header class="topbar">
  <div class="logo">⚡ Meta Ads <span>Analyzer</span></div>
  <select class="sel" id="accountSel" style="max-width:230px"><option value="">A carregar...</option></select>
  <select class="sel" id="dateSel" onchange="onDateSelChange()">
    <option value="last_7d">7 dias</option><option value="last_30d" selected>30 dias</option>
    <option value="this_month">Este mês</option><option value="last_month">Mês passado</option>
    <option value="custom">Personalizado...</option>
  </select>
  <div id="customDateWrap" style="display:none;align-items:center;gap:4px">
    <input type="date" id="customSince" class="sel"><input type="date" id="customUntil" class="sel">
  </div>
  <button class="btn btn-primary" onclick="runAnalysis()">Analisar</button>
  <div style="margin-left:auto; display:flex; align-items:center; gap:10px">
    <span id="uName">Alex</span>
    <img id="uAvatar" style="width:28px; border-radius:50%">
    <a href="/auth/logout" style="color:var(--dim); font-size:11px; text-decoration:none">Sair</a>
  </div>
</header>

<div class="app-body">
  <aside class="sidebar">
    <div style="padding:10px; font-weight:800; color:var(--dim)">MENU</div>
    <button class="nav-item active" onclick="showView('overview')">📊 Visão Geral</button>
    <button class="nav-item" onclick="showView('analysis')">🧠 Análise IA</button>
    <button class="nav-item" onclick="showView('campaigns')">📋 Campanhas</button>
    <button class="nav-item" onclick="showView('breakdown')">📉 Breakdown</button>
    <button class="nav-item" onclick="showView('content')">📸 Conteúdo IG</button>
    <button class="nav-item" onclick="showView('google')">🔍 Google Ads</button>
    <button class="nav-item" onclick="showView('trend')">📈 Tendências</button>
  </aside>

  <main class="main" id="mainContent">
    <div id="stateEmpty" style="text-align:center; padding-top:100px; opacity:0.6">
      <h2>Selecione uma conta para começar</h2>
    </div>

    <div id="contentWrap" style="display:none">
      <div id="view-overview">
        <div id="analysisSummary" style="background:var(--s1); padding:20px; border-radius:12px; margin-bottom:15px"></div>
        <div class="mgrid" id="metricsGrid"></div>
        <table style="background:var(--s1); border-radius:12px; overflow:hidden">
          <thead><tr><th>Campanha</th><th>Status</th><th>Gasto</th><th>CTR</th><th>CPC</th><th>Freq.</th></tr></thead>
          <tbody id="campTbody"></tbody>
        </table>
      </div>
      <div id="view-analysis" style="display:none"><div id="optimList"></div></div>
      <div id="view-breakdown" style="display:none"><div id="bdContent"></div></div>
      <div id="view-content" style="display:none">
        <div style="background:var(--s1); padding:20px; border-radius:12px">
          <h3>Planejamento de Conteúdo</h3>
          <select id="igAccSel" class="sel"><option value="">Carregar IG...</option></select>
          <input type="text" id="igNiche" placeholder="Nicho" class="sel" style="margin-top:10px; width:100%">
          <button class="btn btn-primary" onclick="generateContentPlan()" style="margin-top:10px">Gerar com IA</button>
          <div id="contentPlanOutput" style="margin-top:15px"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><div id="loadText">A processar...</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
let accounts=[], campaigns=[], metrics=null, analysis=null, selAccountId=null, contentPlan=null;

function showLoad(t){ document.getElementById('loadingOverlay').classList.add('show'); document.getElementById('loadText').textContent=t; }
function hideLoad(){ document.getElementById('loadingOverlay').classList.remove('show'); }

async function init(){
  try {
    const me = await fetch('/api/me').then(r=>r.json());
    if(!me.authenticated) return location.href='/';
    document.getElementById('uName').textContent = me.user.name;
    if(me.user.picture) document.getElementById('uAvatar').src = me.user.picture.data?.url || me.user.picture;
    await loadAccounts();
  } catch(e) { console.error(e); }
}

async function loadAccounts(){
  const d = await fetch('/api/adaccounts').then(r=>r.json());
  accounts = d.data || [];
  const sel = document.getElementById('accountSel');
  sel.innerHTML = '<option value="">Escolha...</option>' + accounts.map(a => `<option value="${a.account_id}">${a.name}</option>`).join('');
  sel.onchange = onAccChange;
}

async function onAccChange(){
  selAccountId = document.getElementById('accountSel').value;
  if(!selAccountId) return;
  showLoad('Carregando campanhas...');
  try {
    const d = await fetch(`/api/adaccounts/${selAccountId}/campaigns`).then(r=>r.json());
    campaigns = d.data || [];
  } finally { hideLoad(); }
}

function onDateSelChange(){ document.getElementById('customDateWrap').style.display = document.getElementById('dateSel').value === 'custom' ? 'flex' : 'none'; }

function showView(v){
  const views = ['overview','analysis','campaigns','breakdown','content','google','trend'];
  views.forEach(id => { const el = document.getElementById('view-'+id); if(el) el.style.display = id === v ? 'block' : 'none'; });
  document.querySelectorAll('.nav-item').forEach(btn => btn.classList.toggle('active', btn.textContent.toLowerCase().includes(v.replace('overview','visão'))));
}

async function runAnalysis(){
  if(!selAccountId) return alert('Escolha uma conta');
  showLoad('Analisando...');
  const d = document.getElementById('dateSel').value;
  let params = `date_preset=${d}`;
  if(d==='custom') params = `since=${document.getElementById('customSince').value}&until=${document.getElementById('customUntil').value}`;
  try {
    const ins = await fetch(`/api/adaccounts/${selAccountId}/insights?${params}`).then(r=>r.json());
    const res = await fetch('/api/analyze', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({accountData:accounts.find(a=>a.account_id===selAccountId),campaigns,insights:ins,dateRange:d}) }).then(r=>r.json());
    metrics = res.metrics; analysis = res.analysis; renderAll();
  } catch(e) { alert(e.message); }
  finally { hideLoad(); }
}

function renderAll(){
  document.getElementById('stateEmpty').style.display='none'; document.getElementById('contentWrap').style.display='block';
  const r = analysis.resumo_geral; const S = accounts.find(a=>a.account_id===selAccountId).currency==='BRL'?'R$':'$';
  document.getElementById('analysisSummary').innerHTML = `<b>${r.nivel_saude} (${r.score_saude} pts)</b><p>${r.resumo_historico}</p>`;
  document.getElementById('metricsGrid').innerHTML = `<div class="mcard"><div class="mlabel">Gasto</div><div class="mval">${S} ${metrics.totalSpend.toFixed(2)}</div></div><div class="mcard"><div class="mlabel">CTR</div><div class="mval">${metrics.avgCtr.toFixed(2)}%</div></div>`;
  document.getElementById('campTbody').innerHTML = analysis.campanhas_analise.map(c=>`<tr><td>${c.nome}</td><td>${c.status_performance}</td><td>${c.gasto}</td><td>${c.ctr}</td><td>${c.cpc}</td><td>${c.frequencia}x</td></tr>`).join('');
}

async function exportContentPlan(){
  if(!contentPlan){alert('Gere o plano.');return;}
  let html='<html><body><h1>Planeamento</h1>';
  (contentPlan.plano||[]).forEach(p=>{
    html+=`<div><b>Dia ${p.dia}</b>: ${p.titulo}<br>${p.copy.replace(/\n/g,'<br>')}</div><hr>`;
  });
  html+='</body></html>';
  const w=window.open('','_blank'); w.document.write(html); w.document.close();
}

init();
</script>
</body>
</html>
