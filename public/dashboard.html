<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meta Ads Analyzer</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#08090d;--s1:#0f1118;--s2:#161923;--s3:#1c2130;
      --b1:#1e2433;--b2:#252d3f;
      --blue:#1877F2;--cyan:#00d4ff;--green:#00e676;
      --orange:#ff9800;--red:#ff3860;--yellow:#ffeb3b;--purple:#b388ff;
      --text:#e8eaf0;--dim:#8892a4;--muted:#3d4456;
    }
    body{background:var(--bg);color:var(--text);font-family:Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;font-size:13px}
    .topbar{height:52px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:100}
    .logo{font-weight:700;font-size:14px}.logo span{color:var(--cyan)}
    .sel{background:var(--s2);border:1px solid var(--b1);color:var(--text);padding:5px 10px;border-radius:6px;cursor:pointer}
    .btn{padding:6px 14px;border-radius:7px;font-weight:700;cursor:pointer;border:none}
    .btn-primary{background:var(--blue);color:#fff}
    .app-body{display:flex;flex:1}.sidebar{width:210px;background:var(--s1);border-right:1px solid var(--b1);padding:10px}
    .main{flex:1;padding:18px}.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:15px}
    .mcard{background:var(--s1);border:1px solid var(--b1);border-radius:9px;padding:12px}
    .mval{font-size:20px;font-weight:800}.mlabel{font-size:9px;color:var(--muted);text-transform:uppercase}
    .loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;color:#fff}
    .loading-overlay.show{display:flex}
    .score-ring{width:60px;height:60px;border:3px solid var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th,td{padding:10px;text-align:left;border-bottom:1px solid var(--b1)}
  </style>
</head>
<body>

<header class="topbar">
  <div class="logo">Meta Ads <span>Analyzer</span></div>
  <select class="sel" id="accountSel"><option value="">A carregar contas...</option></select>
  <select class="sel" id="dateSel" onchange="onDateSelChange()">
    <option value="last_7d">7 dias</option>
    <option value="last_30d" selected>30 dias</option>
    <option value="custom">Personalizado...</option>
  </select>
  <div id="customDateWrap" style="display:none;gap:5px">
    <input type="date" id="customSince" class="sel">
    <input type="date" id="customUntil" class="sel">
  </div>
  <button class="btn btn-primary" onclick="runAnalysis()">Analisar</button>
  <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
    <span id="uName">...</span>
    <img id="uAvatar" src="" style="width:24px;border-radius:50%">
    <a href="/auth/logout" style="color:var(--dim);text-decoration:none;font-size:11px">Sair</a>
  </div>
</header>

<div class="app-body">
  <aside class="sidebar">
    <div id="campSidebar" style="font-size:11px;color:var(--dim)">Selecione uma conta</div>
  </aside>
  <main class="main">
    <div id="stateEmpty" style="text-align:center;padding:50px"><h2>Selecione uma conta e clique em Analisar</h2></div>
    <div id="contentWrap" style="display:none">
      <div id="analysisSummary" style="background:var(--s1);padding:15px;border-radius:10px;margin-bottom:15px;display:flex;align-items:center;gap:20px"></div>
      <div class="mgrid" id="metricsGrid"></div>
      <h3>Otimizações</h3>
      <div id="optimList" style="margin-bottom:20px"></div>
      <h3>Campanhas</h3>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Campanha</th><th>Performance</th><th>Gasto</th><th>CTR</th><th>CPC</th></tr></thead>
          <tbody id="campTbody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="loading-overlay" id="loadingOverlay">A carregar...</div>

<script>
let accounts=[], campaigns=[], metrics=null, analysis=null, selAccountId=null, selCurrency='BRL';

async function init(){
  const me = await fetch('/api/me').then(r=>r.json());
  if(!me.authenticated) return location.href='/';
  document.getElementById('uName').textContent = me.user.name;
  if(me.user.picture) document.getElementById('uAvatar').src = me.user.picture.data?.url || me.user.picture;
  await loadAccounts();
}

async function loadAccounts(){
  const res = await fetch('/api/adaccounts').then(r=>r.json());
  accounts = res.data || [];
  const sel = document.getElementById('accountSel');
  if(!accounts.length) return sel.innerHTML = '<option>Sem contas</option>';
  sel.innerHTML = '<option value="">Selecione uma conta...</option>' + 
    accounts.map(a => `<option value="${a.account_id}">${a.name} (${a.currency})</option>`).join('');
  sel.onchange = onAccChange;
}

async function onAccChange(){
  selAccountId = document.getElementById('accountSel').value;
  if(!selAccountId) return;
  const acct = accounts.find(a=>a.account_id === selAccountId);
  selCurrency = acct.currency;
  const res = await fetch(`/api/adaccounts/${selAccountId}/campaigns`).then(r=>r.json());
  campaigns = res.data || [];
  document.getElementById('campSidebar').innerHTML = campaigns.map(c=>`<div>${c.name}</div>`).join('');
}

function onDateSelChange(){
  document.getElementById('customDateWrap').style.display = document.getElementById('dateSel').value === 'custom' ? 'flex' : 'none';
}

async function runAnalysis(){
  if(!selAccountId) return alert('Selecione uma conta');
  const d = document.getElementById('dateSel').value;
  const body = {
    accountData: accounts.find(a=>a.account_id === selAccountId),
    campaigns,
    dateRange: d,
    insights: {}
  };
  
  if(d === 'custom'){
    body.since = document.getElementById('customSince').value;
    body.until = document.getElementById('customUntil').value;
  }

  document.getElementById('loadingOverlay').classList.add('show');
  try {
    const ins = await fetch(`/api/adaccounts/${selAccountId}/insights?date_preset=${d}`).then(r=>r.json());
    body.insights = ins;
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    }).then(r=>r.json());
    
    if(res.error) throw new Error(res.error);
    metrics = res.metrics; analysis = res.analysis;
    renderAll();
  } catch(e) { alert('Erro: ' + e.message); }
  finally { document.getElementById('loadingOverlay').classList.remove('show'); }
}

function renderAll(){
  document.getElementById('stateEmpty').style.display = 'none';
  document.getElementById('contentWrap').style.display = 'block';
  renderMetrics(); renderSummary(); renderOptims(); renderTable();
}

function renderMetrics(){
  if(!metrics) return;
  const S = selCurrency === 'BRL' ? 'R$' : '$';
  document.getElementById('metricsGrid').innerHTML = `
    <div class="mcard"><div class="mlabel">Gasto</div><div class="mval">${S} ${metrics.totalSpend.toFixed(2)}</div></div>
    <div class="mcard"><div class="mlabel">CTR</div><div class="mval">${metrics.avgCtr.toFixed(2)}%</div></div>
    <div class="mcard"><div class="mlabel">CPC</div><div class="mval">${S} ${metrics.avgCpc.toFixed(2)}</div></div>
    <div class="mcard"><div class="mlabel">Impres.</div><div class="mval">${metrics.totalImpressions}</div></div>
  `;
}

function renderSummary(){
  if(!analysis) return;
  const r = analysis.resumo_geral;
  document.getElementById('analysisSummary').innerHTML = `
    <div class="score-ring">${r.score_saude}</div>
    <div>
      <div style="font-size:18px;font-weight:800">${r.nivel_saude}</div>
      <div style="color:var(--dim)">${r.resumo_historico}</div>
    </div>
  `;
}

function renderOptims(){
  const list = analysis.otimizacoes_prioritarias || [];
  document.getElementById('optimList').innerHTML = list.map(o => `
    <div style="background:var(--s2);padding:10px;border-radius:8px;margin-bottom:5px">
      <strong>#${o.prioridade} ${o.titulo}</strong> - ${o.descricao}
    </div>
  `).join('');
}

function renderTable(){
  const list = analysis.campanhas_analise || [];
  document.getElementById('campTbody').innerHTML = list.map(c => `
    <tr>
      <td>${c.nome}</td>
      <td>${c.status_performance}</td>
      <td>${c.gasto}</td>
      <td>${c.ctr}</td>
      <td>${c.cpc}</td>
    </tr>
  `).join('');
}

init();
</script>
</body>
</html>
